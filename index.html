<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✦ Telegram Premium Downloader ✦</title>
    
    <!-- تحميل المكتبات بشكل صحيح -->
    <script src="https://cdn.jsdelivr.net/npm/gram-js@1.7.16/dist/gramjs.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }

        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1a2e 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
            position: relative;
        }

        .bg-stars {
            position: fixed;
            inset: 0;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #fff, transparent),
                radial-gradient(2px 2px at 60px 70px, #fff, transparent),
                radial-gradient(1px 1px at 50px 160px, #fff, transparent);
            background-size: 200px 200px;
            opacity: 0.3;
            animation: twinkle 4s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            padding: 30px 0;
            margin-bottom: 20px;        }

        .logo {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(90deg, #00f2ff, #bd00ff, #ff00aa);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% center; }
            50% { background-position: 100% center; }
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            margin-top: 10px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #00f2ff;
            font-weight: 600;
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }

        input:focus {
            border-color: #00f2ff;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        .btn {
            background: linear-gradient(135deg, #00f2ff, #bd00ff);
            color: #fff;
            border: none;
            padding: 14px 30px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin: 5px;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(189, 0, 255, 0.5);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(0, 242, 255, 0.3);
        }
        .alert {
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            display: none;
        }

        .alert.active { display: block; animation: slideIn 0.3s; }

        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .alert-error {
            background: rgba(255, 50, 50, 0.2);
            border: 1px solid rgba(255, 50, 50, 0.4);
            color: #ff6b6b;
        }

        .alert-success {
            background: rgba(50, 255, 100, 0.2);
            border: 1px solid rgba(50, 255, 100, 0.4);
            color: #6bff8b;
        }

        .alert-info {
            background: rgba(0, 242, 255, 0.15);
            border: 1px solid rgba(0, 242, 255, 0.3);
            color: #00f2ff;
        }

        .loading {
            text-align: center;
            padding: 20px;
            display: none;
        }

        .loading.active { display: block; }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(0, 242, 255, 0.2);
            border-top-color: #00f2ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-indicator {
            position: fixed;
            top: 15px;
            right: 15px;
            padding: 8px 15px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.6);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
        }

        .status-dot.connected { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
        .status-dot.connecting { background: #ffaa00; animation: pulse 1s infinite; }
        .status-dot.error { background: #ff3333; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: linear-gradient(135deg, #1a0a2e, #0a1a2e);
            border: 2px solid rgba(0, 242, 255, 0.3);            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .modal-content h3 {
            color: #00f2ff;
            margin-bottom: 15px;
        }

        .user-profile {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .user-profile.active { display: block; }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00f2ff, #bd00ff);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.4);
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .post-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            padding: 15px;
            transition: all 0.3s;
        }

        .post-card:hover {
            transform: translateY(-5px);            border-color: rgba(0, 242, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.2);
        }

        .download-btn {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: rgba(0, 242, 255, 0.2);
            border: 1px solid rgba(0, 242, 255, 0.4);
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .download-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #00f2ff, #bd00ff);
        }

        .download-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .logo { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="bg-stars"></div>

    <div class="status-indicator">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">غير متصل</span>
    </div>

    <div class="container">
        <header>
            <div class="logo">✦ Telegram Downloader ✦</div>
            <div class="subtitle">جلسات مميزة - تحميل مباشر</div>
        </header>

        <div class="glass-card">
            <h2 style="margin-bottom: 20px; color: #00f2ff;">🔐 بيانات الاتصال</h2>
            
            <div class="form-grid">                <div class="input-group">
                    <label>API ID</label>
                    <input type="number" id="apiId" placeholder="11111111">
                </div>

                <div class="input-group">
                    <label>API Hash</label>
                    <input type="text" id="apiHash" placeholder="your_api_hash">
                </div>

                <div class="input-group">
                    <label>رقم الهاتف (مع رمز الدولة)</label>
                    <input type="tel" id="phoneNumber" placeholder="+966500000000">
                </div>

                <div class="input-group">
                    <label>يوزر الحساب/القناة</label>
                    <input type="text" id="targetUsername" placeholder="username">
                </div>
            </div>

            <div style="text-align: center;">
                <button class="btn" id="connectBtn" onclick="startConnection()">
                    <span>⚡</span>
                    <span>إنشاء الجلسة والاتصال</span>
                </button>
                <button class="btn btn-secondary" onclick="clearSession()">
                    <span>🗑️</span>
                    <span>مسح الجلسة</span>
                </button>
            </div>

            <div class="alert" id="alertBox"></div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div id="loadingText">جاري الاتصال...</div>
        </div>

        <div class="glass-card user-profile" id="userProfile">
            <div class="avatar" id="userAvatar">👤</div>
            <h2 id="userName">اسم المستخدم</h2>
            <p id="userBio" style="color: rgba(255,255,255,0.6); margin: 10px 0;"></p>
            <div id="userId" style="color: #00f2ff;"></div>
        </div>

        <div class="glass-card" id="postsSection" style="display: none;">
            <h3 style="color: #00f2ff; margin-bottom: 15px;">📥 المنشورات</h3>
            <div class="posts-grid" id="postsGrid"></div>        </div>
    </div>

    <div class="modal" id="codeModal">
        <div class="modal-content">
            <h3>📱 كود التحقق</h3>
            <p style="margin-bottom: 15px; color: rgba(255,255,255,0.7);">أدخل الكود المرسل إلى تليجرام:</p>
            <input type="text" id="verificationCode" placeholder="12345" style="text-align: center; font-size: 1.5rem; letter-spacing: 5px; margin-bottom: 15px;">
            <button class="btn" onclick="submitCode()">تأكيد</button>
        </div>
    </div>

    <script>
        // التأكد من تحميل المكتبة
        let TelegramClient = null;
        let StringSession = null;
        let Api = null;
        let client = null;
        let stringSession = new String('');

        // التحقق من تحميل المكتبة عند تحميل الصفحة
        window.addEventListener('load', () => {
            if (typeof GramJS !== 'undefined') {
                TelegramClient = GramJS.TelegramClient;
                StringSession = GramJS.sessions.StringSession;
                Api = GramJS.api;
                console.log('✓ GramJS loaded successfully');
                
                // استعادة الجلسة
                const saved = localStorage.getItem('tg_session');
                if (saved) {
                    stringSession = new StringSession(saved);
                }
            } else {
                showAlert('error', '❌ فشل تحميل المكتبة. تأكد من اتصالك بالإنترنت وحاول تحديث الصفحة.');
            }
        });

        function updateStatus(state, text) {
            const dot = document.getElementById('statusDot');
            const txt = document.getElementById('statusText');
            dot.className = 'status-dot ' + state;
            txt.textContent = text;
        }

        function showAlert(type, message) {
            const box = document.getElementById('alertBox');
            box.className = 'alert alert-' + type + ' active';
            box.textContent = message;
            setTimeout(() => box.classList.remove('active'), 6000);        }

        function setLoading(active, text = 'جاري المعالجة...') {
            const loading = document.getElementById('loading');
            const loadingText = document.getElementById('loadingText');
            if (active) {
                loading.classList.add('active');
                loadingText.textContent = text;
            } else {
                loading.classList.remove('active');
            }
        }

        async function startConnection() {
            // التحقق من تحميل المكتبة
            if (!TelegramClient) {
                showAlert('error', '❌ المكتبة لم يتم تحميلها. يرجى تحديث الصفحة.');
                return;
            }

            const apiId = parseInt(document.getElementById('apiId').value.trim());
            const apiHash = document.getElementById('apiHash').value.trim();
            const phone = document.getElementById('phoneNumber').value.trim();
            const targetUser = document.getElementById('targetUsername').value.trim();

            if (!apiId || !apiHash || !phone || !targetUser) {
                showAlert('error', '❌ الرجاء ملء جميع الحقول');
                return;
            }

            // حفظ البيانات
            localStorage.setItem('tg_api_id', apiId);
            localStorage.setItem('tg_api_hash', apiHash);

            document.getElementById('connectBtn').disabled = true;
            updateStatus('connecting', 'جاري الاتصال...');
            setLoading(true, 'جاري الاتصال بخوادم تليجرام...');

            try {
                client = new TelegramClient(stringSession, apiId, apiHash, {
                    connectionRetries: 5,
                    useWSS: true,
                });

                await client.connect();
                setLoading(true, 'جاري التحقق من الحساب...');

                if (!await client.isUserAuthorized()) {
                    setLoading(true, 'جاري إرسال كود التحقق...');
                                        await client.sendCode({ apiId, apiHash }, phone, { phoneNumber: phone });
                    
                    // انتظار الكود
                    const code = await waitForCode();
                    setLoading(true, 'جاري التحقق من الكود...');

                    await client.invoke(
                        new Api.auth.SignIn({
                            phoneNumber: phone,
                            phoneCodeHash: code.hash,
                            phoneCode: code.code,
                        })
                    );
                }

                // حفظ الجلسة
                stringSession = client.session.save();
                localStorage.setItem('tg_session', stringSession);

                updateStatus('connected', 'متصل');
                setLoading(true, 'جاري جلب البيانات...');

                await fetchTargetUser(targetUser);
                setLoading(false);
                showAlert('success', '✓ تم الاتصال بنجاح!');

            } catch (error) {
                console.error(error);
                updateStatus('error', 'خطأ');
                showAlert('error', '❌ خطأ: ' + (error.message || error.errorMessage || 'فشل الاتصال'));
                setLoading(false);
            } finally {
                document.getElementById('connectBtn').disabled = false;
            }
        }

        function waitForCode() {
            return new Promise((resolve) => {
                window.codeResolve = resolve;
                document.getElementById('codeModal').classList.add('active');
                document.getElementById('verificationCode').value = '';
                document.getElementById('verificationCode').focus();
            });
        }

        async function submitCode() {
            const code = document.getElementById('verificationCode').value.trim();
            if (!code || !window.codeResolve) return;
            
            document.getElementById('codeModal').classList.remove('active');            
            try {
                const phone = document.getElementById('phoneNumber').value.trim();
                await client.invoke(
                    new Api.auth.SignIn({
                        phoneNumber: phone,
                        phoneCodeHash: '',
                        phoneCode: code,
                    })
                );
                window.codeResolve({ code, hash: '' });
            } catch (e) {
                showAlert('error', 'كود غير صحيح: ' + e.errorMessage);
                document.getElementById('codeModal').classList.add('active');
            }
        }

        async function fetchTargetUser(username) {
            username = username.replace('@', '');
            
            try {
                const entity = await client.getEntity(username);
                
                const name = entity.title || entity.firstName || entity.username || 'مستخدم';
                const bio = entity.about || entity.bio || 'لا يوجد وصف';
                const id = entity.id.toString();
                const type = entity.className?.includes('Channel') ? 'قناة' : 
                            entity.className?.includes('Chat') ? 'مجموعة' : 'مستخدم';

                document.getElementById('userName').textContent = name;
                document.getElementById('userBio').textContent = bio;
                document.getElementById('userId').textContent = `ID: ${id} | النوع: ${type}`;
                
                const avatar = document.getElementById('userAvatar');
                avatar.textContent = type === 'قناة' ? '📢' : type === 'مجموعة' ? '👥' : '👤';

                document.getElementById('userProfile').classList.add('active');

                await fetchPosts(entity);

            } catch (error) {
                showAlert('error', 'فشل جلب الحساب: ' + (error.errorMessage || error.message));
            }
        }

        async function fetchPosts(entity) {
            const postsGrid = document.getElementById('postsGrid');
            postsGrid.innerHTML = '';

            try {                const messages = await client.getMessages(entity, { limit: 30 });
                document.getElementById('postsSection').style.display = 'block';

                if (messages.length === 0) {
                    postsGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 30px;">لا توجد منشورات</div>';
                    return;
                }

                messages.forEach((msg, index) => {
                    setTimeout(() => createPostCard(msg, entity, index), index * 50);
                });

            } catch (error) {
                showAlert('error', 'فشل جلب المنشورات: ' + error.errorMessage);
            }
        }

        function createPostCard(message, entity, index) {
            const container = document.getElementById('postsGrid');
            const card = document.createElement('div');
            card.className = 'post-card';

            const hasMedia = message.photo || message.video || message.document;
            const text = message.text || message.message || '';
            const date = new Date(message.date * 1000).toLocaleString('ar-SA');
            
            let typeBadge = hasMedia ? (message.photo ? '📷 صورة' : message.video ? '🎥 فيديو' : '📄 ملف') : '📝 نص';

            card.innerHTML = `
                <div style="padding: 10px; background: rgba(0,0,0,0.2); border-radius: 10px; margin-bottom: 10px;">
                    <span style="color: #00f2ff; font-size: 0.85rem;">${typeBadge}</span>
                </div>
                ${text ? `<div style="color: rgba(255,255,255,0.8); margin-bottom: 10px; font-size: 0.9rem;">${text.substring(0, 100)}${text.length > 100 ? '...' : ''}</div>` : ''}
                <div style="color: rgba(255,255,255,0.5); font-size: 0.8rem; margin-bottom: 10px;">📅 ${date}</div>
                <button class="download-btn" onclick="downloadMedia(${message.id}, this)" ${!hasMedia ? 'disabled' : ''}>
                    ${hasMedia ? '⬇ تحميل' : 'لا يوجد وسائط'}
                </button>
            `;

            container.appendChild(card);
        }

        async function downloadMedia(messageId, btn) {
            if (!client) {
                showAlert('error', 'يجب الاتصال أولاً');
                return;
            }

            const originalText = btn.innerHTML;
            btn.disabled = true;            btn.innerHTML = '⏳ جاري التحميل...';

            try {
                const username = document.getElementById('targetUsername').value.replace('@', '');
                const entity = await client.getEntity(username);
                const messages = await client.getMessages(entity, { ids: [messageId] });
                const message = messages[0];

                if (!message) throw new Error('الرسالة غير موجودة');

                const buffer = await client.downloadMedia(message, {
                    progressCallback: (progress) => {
                        const percent = Math.round((progress.received / progress.total) * 100);
                        btn.innerHTML = `⏳ ${percent}%`;
                    }
                });

                const blob = new Blob([buffer]);
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `telegram_${messageId}.dat`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                btn.innerHTML = '✓ تم التحميل';
                showAlert('success', 'تم التحميل بنجاح!');

            } catch (error) {
                btn.innerHTML = originalText;
                btn.disabled = false;
                showAlert('error', 'فشل التحميل: ' + error.message);
            }
        }

        function clearSession() {
            if (confirm('هل تريد مسح الجلسة؟')) {
                localStorage.removeItem('tg_session');
                location.reload();
            }
        }

        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && document.getElementById('codeModal').classList.contains('active')) {
                submitCode();
            }
        });
    </script></body>
</html>
