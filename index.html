<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محمل تليجرام الفاخر</title>
    <script src="https://cdn.jsdelivr.net/npm/tdweb@latest/dist/tdweb.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 50%, #1e1e2e 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        /* خلفية متحركة */
        .bg-animation {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation span {
            position: absolute;
            display: block;
            width: 20px;
            height: 20px;
            background: rgba(0, 242, 255, 0.1);
            animation: float 25s infinite;
            bottom: -150px;
            border-radius: 50%;
        }

        .bg-animation span:nth-child(1) { left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
        .bg-animation span:nth-child(2) { left: 10%; width: 20px; height: 20px; animation-delay: 2s; animation-duration: 12s; }
        .bg-animation span:nth-child(3) { left: 70%; width: 20px; height: 20px; animation-delay: 4s; }
        .bg-animation span:nth-child(4) { left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; }
        .bg-animation span:nth-child(5) { left: 65%; width: 20px; height: 20px; animation-delay: 0s; }
        .bg-animation span:nth-child(6) { left: 75%; width: 110px; height: 110px; animation-delay: 3s; }        .bg-animation span:nth-child(7) { left: 35%; width: 150px; height: 150px; animation-delay: 7s; }
        .bg-animation span:nth-child(8) { left: 50%; width: 25px; height: 25px; animation-delay: 15s; animation-duration: 45s; }
        .bg-animation span:nth-child(9) { left: 20%; width: 15px; height: 15px; animation-delay: 2s; animation-duration: 35s; }
        .bg-animation span:nth-child(10) { left: 85%; width: 150px; height: 150px; animation-delay: 0s; animation-duration: 11s; }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 0; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; border-radius: 50%; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0;
            position: relative;
        }

        .logo {
            font-size: 3rem;
            font-weight: bold;
            background: linear-gradient(45deg, #00f2ff, #bd00ff, #00f2ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient 3s ease infinite;
            text-shadow: 0 0 30px rgba(0, 242, 255, 0.5);
            margin-bottom: 10px;
        }

        @keyframes gradient {
            0%, 100% { background-position: 0% center; }
            50% { background-position: 100% center; }
        }

        .subtitle {
            color: #888;
            font-size: 1.1rem;
        }

        /* البطاقة الزجاجية */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;            padding: 40px;
            margin: 30px 0;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3), 
                        inset 0 0 0 1px rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        .glass-card:hover::before {
            opacity: 1;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #00f2ff;
            font-weight: 600;
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }

        input:focus {            border-color: #00f2ff;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            background: rgba(0, 0, 0, 0.5);
        }

        .btn {
            background: linear-gradient(45deg, #00f2ff, #bd00ff);
            color: #fff;
            border: none;
            padding: 15px 40px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.3);
            position: relative;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 242, 255, 0.4);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:active::after {
            width: 300px;
            height: 300px;
        }
        /* شريط التحميل */
        .loading-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
            display: none;
            position: relative;
        }

        .loading-bar::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, #00f2ff, transparent);
            animation: loading 2s infinite;
        }

        @keyframes loading {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00f2ff, #bd00ff);
            width: 0%;
            transition: width 0.3s;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
        }

        /* معلومات المستخدم */
        .user-profile {
            display: none;
            text-align: center;
            padding: 30px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(0, 242, 255, 0.2);
        }

        .avatar {
            width: 100px;
            height: 100px;            border-radius: 50%;
            background: linear-gradient(45deg, #00f2ff, #bd00ff);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .user-name {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: #00f2ff;
        }

        .user-bio {
            color: #888;
            margin-bottom: 15px;
            font-size: 1rem;
        }

        .user-id {
            background: rgba(0, 242, 255, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            font-size: 0.9rem;
            color: #00f2ff;
        }

        /* شبكة المنشورات */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .post-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;            transition: all 0.3s;
            position: relative;
            backdrop-filter: blur(10px);
        }

        .post-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(0, 242, 255, 0.3);
        }

        .post-media {
            width: 100%;
            height: 250px;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .post-media img, .post-media video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .media-icon {
            font-size: 4rem;
            opacity: 0.5;
        }

        .post-content {
            padding: 20px;
        }

        .post-text {
            color: #ccc;
            margin-bottom: 15px;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .post-date {
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 15px;
        }
        .download-btn {
            width: 100%;
            padding: 12px;
            background: rgba(0, 242, 255, 0.1);
            border: 2px solid #00f2ff;
            color: #00f2ff;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .download-btn:hover {
            background: #00f2ff;
            color: #000;
            box-shadow: 0 5px 20px rgba(0, 242, 255, 0.4);
        }

        .hidden {
            display: none;
        }

        .error-msg {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            color: #ff6b6b;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            display: none;
        }

        .success-msg {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid rgba(0, 255, 0, 0.3);
            color: #6bff6b;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            display: none;
        }

        /* تأثيرات إضافية */
        .glow {
            position: absolute;
            width: 100px;            height: 100px;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.4) 0%, transparent 70%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .glass-card:hover .glow {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .logo { font-size: 2rem; }
            .glass-card { padding: 25px; }
            .posts-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="container">
        <header>
            <div class="logo">✦ Telegram Downloader ✦</div>
            <div class="subtitle">حمّل المنشورات بجودة عالية وبشكل مباشر</div>
        </header>

        <div class="glass-card">
            <div class="input-group">
                <label> API ID</label>
                <input type="number" id="apiId" placeholder="أدخل API ID الخاص بك">
            </div>

            <div class="input-group">
                <label>🔐 API Hash</label>
                <input type="text" id="apiHash" placeholder="أدخل API Hash الخاص بك">
            </div>

            <div class="input-group">
                <label>👤 يوزر الحساب أو القناة</label>
                <input type="text" id="username" placeholder="@username أو username">
            </div>

            <button class="btn" onclick="connectAndFetch()">
                <span>🔍</span>
                <span>بحث وجلب المنشورات</span>
            </button>
            <div class="loading-bar" id="loadingBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <div class="error-msg" id="errorMsg"></div>
            <div class="success-msg" id="successMsg"></div>
        </div>

        <div id="userProfile" class="user-profile glass-card">
            <div class="avatar" id="userAvatar">👤</div>
            <h2 class="user-name" id="userName">اسم المستخدم</h2>
            <p class="user-bio" id="userBio">لا يوجد وصف</p>
            <div class="user-id" id="userId">ID: 000000</div>
        </div>

        <div id="postsContainer" class="posts-grid"></div>
    </div>

    <script>
        let client = null;
        let currentUsername = '';

        function showLoading() {
            document.getElementById('loadingBar').style.display = 'block';
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress > 90) progress = 90;
                document.getElementById('progressFill').style.width = progress + '%';
            }, 200);
            return interval;
        }

        function hideLoading(interval) {
            clearInterval(interval);
            document.getElementById('progressFill').style.width = '100%';
            setTimeout(() => {
                document.getElementById('loadingBar').style.display = 'none';
                document.getElementById('progressFill').style.width = '0%';
            }, 500);
        }

        function showError(msg) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
            setTimeout(() => errorDiv.style.display = 'none', 5000);
        }
        function showSuccess(msg) {
            const successDiv = document.getElementById('successMsg');
            successDiv.textContent = msg;
            successDiv.style.display = 'block';
            setTimeout(() => successDiv.style.display = 'none', 3000);
        }

        async function connectAndFetch() {
            const apiId = document.getElementById('apiId').value.trim();
            const apiHash = document.getElementById('apiHash').value.trim();
            const username = document.getElementById('username').value.trim().replace('@', '');

            if (!apiId || !apiHash || !username) {
                showError('الرجاء ملء جميع الحقول');
                return;
            }

            currentUsername = username;
            const loadingInterval = showLoading();

            try {
                // محاولة الاتصال باستخدام TDWeb
                client = new TdWeb({
                    apiId: parseInt(apiId),
                    apiHash: apiHash,
                    databaseDirectory: 'tdwdb',
                    filesDirectory: 'tdwfiles'
                });

                await client.invoke({
                    _: 'searchPublicChat',
                    username: username
                }).then(async (chat) => {
                    if (chat.id) {
                        // جلب معلومات الحساب
                        const fullInfo = await client.invoke({
                            _: 'getChat',
                            chat_id: chat.id
                        });

                        // عرض معلومات المستخدم
                        displayUserInfo(fullInfo);

                        // جلب المنشورات
                        await fetchPosts(chat.id);
                        showSuccess('تم جلب البيانات بنجاح!');
                    } else {
                        showError('لم يتم العثور على الحساب');
                    }
                }).catch(err => {                    // إذا فشل TDWeb، نستخدم طريقة بديلة
                    useWebTelegram(username);
                });

            } catch (error) {
                console.error(error);
                // طريقة بديلة: استخدام iframe لـ web.telegram.org
                useWebTelegram(username);
            }

            hideLoading(loadingInterval);
        }

        function displayUserInfo(chat) {
            const profile = document.getElementById('userProfile');
            const title = chat.title || chat.first_name || 'مستخدم';
            const bio = chat.bio || 'لا يوجد وصف متاح';
            const id = chat.id;

            document.getElementById('userName').textContent = title;
            document.getElementById('userBio').textContent = bio;
            document.getElementById('userId').textContent = `ID: ${id}`;
            
            // تحديد الأيقونة حسب النوع
            const avatar = document.getElementById('userAvatar');
            if (chat.type && chat.type.constructor.name === 'ChatTypePrivate') {
                avatar.textContent = '👤';
            } else {
                avatar.textContent = '📢';
            }

            profile.style.display = 'block';
            profile.scrollIntoView({ behavior: 'smooth' });
        }

        async function fetchPosts(chatId) {
            const postsContainer = document.getElementById('postsContainer');
            postsContainer.innerHTML = '';

            try {
                // جلب الرسائل
                const messages = await client.invoke({
                    _: 'getChatHistory',
                    chat_id: chatId,
                    from_message_id: 0,
                    offset: 0,
                    limit: 20
                });

                if (messages.messages) {                    messages.messages.forEach((msg, index) => {
                        setTimeout(() => {
                            createPostCard(msg, index);
                        }, index * 100);
                    });
                }
            } catch (error) {
                console.error('Error fetching posts:', error);
                showError('حدث خطأ في جلب المنشورات');
            }
        }

        function createPostCard(message, index) {
            const container = document.getElementById('postsContainer');
            const card = document.createElement('div');
            card.className = 'post-card';
            card.style.animation = `slideUp 0.5s ease ${index * 0.1}s both`;

            const hasMedia = message.content && (message.content.photo || message.content.video || message.content.document);
            const text = message.content && message.content.text ? message.content.text.text : '';
            const date = new Date(message.date * 1000).toLocaleString('ar-SA');

            let mediaHTML = '';
            if (message.content.photo) {
                mediaHTML = '<div class="media-icon">📷</div>';
            } else if (message.content.video) {
                mediaHTML = '<div class="media-icon">🎥</div>';
            } else if (message.content.document) {
                mediaHTML = '<div class="media-icon">📄</div>';
            } else {
                mediaHTML = '<div class="media-icon">📝</div>';
            }

            card.innerHTML = `
                <div class="post-media">
                    ${mediaHTML}
                </div>
                <div class="post-content">
                    ${text ? `<div class="post-text">${text.substring(0, 100)}${text.length > 100 ? '...' : ''}</div>` : ''}
                    <div class="post-date">📅 ${date}</div>
                    <button class="download-btn" onclick="downloadPost(${message.id})">
                        <span>⬇</span>
                        <span>تحميل المنشور</span>
                    </button>
                </div>
            `;

            container.appendChild(card);
        }
        function useWebTelegram(username) {
            // فتح web.telegram.org في نافذة جديدة مع اليوزر
            const url = `https://web.telegram.org/k/#@${username}`;
            
            const container = document.getElementById('postsContainer');
            container.innerHTML = `
                <div class="glass-card" style="grid-column: 1/-1; text-align: center; padding: 40px;">
                    <h3 style="margin-bottom: 20px; color: #00f2ff;">📱 عرض الحساب في تليجرام ويب</h3>
                    <p style="margin-bottom: 20px; color: #888;">بسبب قيود الأمان في المتصفح، يمكنك فتح الحساب مباشرة في تليجرام ويب</p>
                    <a href="${url}" target="_blank" class="btn" style="text-decoration: none;">
                        فتح في تليجرام ويب 🚀
                    </a>
                    <div style="margin-top: 30px; padding: 20px; background: rgba(0,0,0,0.2); border-radius: 15px;">
                        <p style="font-size: 0.9rem; color: #666;">
                            ملاحظة: لتحميل المنشورات مباشرة، تحتاج إلى:<br>
                            1. استخدام خادم وسيط (Backend Proxy)<br>
                            2. أو استخدام تطبيق سطح المكتب<br>
                            3. أو استخدام Bot API مع توكن
                        </p>
                    </div>
                </div>
            `;
        }

        async function downloadPost(messageId) {
            if (!client) {
                showError('يجب الاتصال أولاً');
                return;
            }

            try {
                showSuccess('جاري تحضير الملف للتحميل...');
                
                // هنا يتم تنفيذ منطق التحميل الفعلي
                // يتطلب معالجة خاصة للملفات من TDWeb
                
                setTimeout(() => {
                    alert('لتحميل الملف فعلياً، تحتاج إلى:\n1. حفظ الملف عبر TDWeb\n2. أو استخدام Bot API\n3. أو الخادم الخلفي');
                }, 1000);
                
            } catch (error) {
                showError('حدث خطأ في التحميل');
            }
        }

        // إضافة أنيميشن CSS ديناميكي
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideUp {
                from {                    opacity: 0;
                    transform: translateY(30px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        `;
        document.head.appendChild(style);

        // حفظ البيانات في localStorage لسهولة الاستخدام
        window.addEventListener('load', () => {
            const savedApiId = localStorage.getItem('tg_api_id');
            const savedApiHash = localStorage.getItem('tg_api_hash');
            
            if (savedApiId) document.getElementById('apiId').value = savedApiId;
            if (savedApiHash) document.getElementById('apiHash').value = savedApiHash;
        });

        // حفظ عند التغيير
        document.getElementById('apiId').addEventListener('change', (e) => {
            localStorage.setItem('tg_api_id', e.target.value);
        });
        document.getElementById('apiHash').addEventListener('change', (e) => {
            localStorage.setItem('tg_api_hash', e.target.value);
        });
    </script>
</body>
</html>
